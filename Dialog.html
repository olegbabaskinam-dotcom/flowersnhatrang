<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  body { font-family: Arial, sans-serif; margin: 12px; color: #202124; }
  p { margin: 4px 0; font-size: 13px; }
  .hint { color: #5f6368; font-size: 12px; }
  code { background: #f1f3f4; padding: 1px 4px; border-radius: 3px; }
  textarea { width: 100%; height: 180px; font-family: monospace; font-size: 13px;
             box-sizing: border-box; margin-top: 6px; }
  button { margin-top: 10px; padding: 8px 18px; font-size: 14px; border: 0;
           border-radius: 6px; background: #0b8043; color: #fff; cursor: pointer; }
  button:disabled { background: #9aa0a6; cursor: default; }
  #status { margin-top: 10px; font-size: 13px; white-space: pre-wrap; }
</style>
</head>
<body>
  <p><b>Формат — одна строка = один заказ:</b></p>
  <p class="hint"><code>ДД.ММ.ГГ | ВРЕМЯ | АДРЕС | ЧТО ЗАКАЗАЛИ | КЛИЕНТ</code><br>
  Обязательны только дата и «что заказали». Пустые поля оставляй между <code>|</code>.</p>
  <textarea id="t" placeholder="06.06.26 | 9:00 | Наполеон | 25 красных роз в Наполеон | тг Иван
06.06.26 |  |  | сборный букет за 1 млн | "></textarea>
  <br>
  <button id="go" onclick="send()">Добавить в обе таблицы</button>
  <div id="status"></div>

<script>
function send() {
  var btn = document.getElementById('go');
  var st = document.getElementById('status');
  btn.disabled = true; st.style.color = '#5f6368'; st.textContent = 'Добавляю…';
  google.script.run
    .withSuccessHandler(function(msg){
      st.style.color = '#0b8043'; st.textContent = '✅ ' + msg;
      btn.disabled = false;
      document.getElementById('t').value = '';
    })
    .withFailureHandler(function(err){
      st.style.color = '#c5221f'; st.textContent = '⚠️ ' + err.message;
      btn.disabled = false;
    })
    .addOrders(document.getElementById('t').value);
}
</script>
</body>
</html>
